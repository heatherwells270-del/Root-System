version: "3.9"

services:
  relay:
    build: .
    image: root-system-relay:latest
    container_name: root-system-relay
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - relay-data:/data
    environment:
      PORT: "8080"
      DB_PATH: "/data/relay.db"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  relay-data:
    driver: local
